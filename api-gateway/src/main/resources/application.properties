spring.application.name=api-gateway

server:
  port: 8080 # This is the ONLY port your Nx frontend will ever talk to

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # --- 1. GLOBAL CORS CONFIGURATION ---
      # This fixes the dreaded browser preflight errors for your Nx app
      globalcors:
        cors-configurations:
          '[/**]': # Apply to all routes
            allowedOrigins: 
              - "http://localhost:4200" # Your Nx frontend URL
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # --- 2. ROUTING TABLE ---
      routes:
        # Route 1: The Onboarding Orchestrator
        - id: onboarding-route
          uri: http://localhost:8082 # Docker Compose will change this to http://onboarding-orchestrator:8080 later
          predicates:
            - Path=/api/v1/onboarding/**

        # Route 2: The Customer Profile Service
        - id: profile-route
          uri: http://localhost:8083 # Direct URL to the microservice
          predicates:
            - Path=/api/v1/profiles/**
          # Optional: You can strip prefixes or rewrite paths here if needed
          # filters:
          #   - RewritePath=/api/v1/profiles/(?<segment>.*), /$\{segment}