spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-profile-service
              uri: http://localhost:8081
              predicates:
                - Path=/customer/**
            - id: onboarding-route
              uri: http://localhost:8082
              predicates:
                - Path=/onboarding/**
            - id: kyc-route
              uri: http://localhost:8083
              predicates:
                - Path=/kyc/**
server:
  port: 8080
